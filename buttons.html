<style>
  .subscribe-button{
    background-color: rgb(200, 0, 0);
    color: white;
    border: none;
    height: 36px;
    width: 104px;
    border-radius: 2px;
    cursor: pointer;
    margin-right: 8px;
    transition: opacity 0.15s;
    vertical-align: top;
  }

  .subscribe-button:hover{
    opacity: 0.8;
  }

  .subscribe-button:active{
    opacity: 0.5;
  }

  .join-button{
    background-color: white;
    color: rgb(41, 96, 206);
    border-color: rgb(41, 96, 206);
    border-style: solid;
    border-width: 1px;
    border-radius: 2px;
    cursor: pointer;
    transition: background-color 0.15s, color 0.15s;
    padding-left: 5px;
    padding-right: 5px; 
    padding-top: 8.8px;
    padding-bottom: 8.8px;
    vertical-align: top;
  }

  .join-button:hover{
    background-color: rgb(41, 96, 206);
    color: white;
  }

  .join-button:active{
    opacity: 0.7;
  }

  .tweet-button{
    background-color: rgba(34, 129, 230, 0.977);
    color: white;
    border-color: rgba(34, 129, 230, 0.977);
    border-style: solid;
    height: 36px;
    width: 80px;
    border-radius: 18px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    margin-left: 8px;
    transition: box-shadow 1s;
    vertical-align: top;
  }

  .tweet-button:hover{
    box-shadow: 5px 5px 10px rgba(0, 0 , 0, 0.15)
  }
</style>

<button class="subscribe-button">
  SUBSCRIBE
</button>

<button class="join-button">
  JOIN my channel
</button>

<button class="tweet-button">
  Tweet
</button>
